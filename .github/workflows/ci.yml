name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rust:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run cargo check
        run: cargo check --workspace

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

      # cargo test now runs on every OS, including windows-latest (refs #25).
      # The remaining POSIX-only tests (mcp_stdio shell-script fixtures, the
      # plugin tool/lifecycle fixtures, the env/path cases, and the fake-PID
      # reconcile test that needs Unix liveness semantics) are gated with
      # `#[cfg(unix)]` and inline justification, so they simply do not compile
      # into the Windows test binaries rather than failing the run.
      - name: Run cargo test
        run: cargo test --workspace

      - name: Run release build
        run: cargo build --release
