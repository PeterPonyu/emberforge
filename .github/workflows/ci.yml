name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rust:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run cargo check
        run: cargo check --workspace

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

      # Test execution is currently Unix-only: a handful of suites rely on POSIX
      # semantics (PID liveness via signal 0, PermissionsExt::set_mode, shell
      # scripts, forward-slash path matches, empty-env-var handling). The
      # Windows runner still gates cargo check, clippy, and the release build,
      # which is the main value of windows-latest for refs #13. Making the
      # tests themselves cross-platform is tracked as a separate follow-up.
      - name: Run cargo test
        if: runner.os != 'Windows'
        run: cargo test --workspace

      - name: Run release build
        run: cargo build --release
