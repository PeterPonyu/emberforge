name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rust:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run cargo check
        run: cargo check --workspace

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

      # cargo test stays skipped on Windows. This PR (refs #25) made several of
      # the originally-listed cases cross-platform and gated the rest, but
      # enabling the Windows run surfaced a further layer of POSIX-only tests
      # that the previous workflow-level skip had hidden: runtime `hooks` and
      # `conversation` tests that shell out to `printf`/`exit` (cmd.exe has no
      # `printf`), and `oauth` tests. Making those portable is a larger effort
      # tracked in #25; windows-latest continues to gate cargo check, clippy,
      # and the release build.
      - name: Run cargo test
        if: runner.os != 'Windows'
        run: cargo test --workspace

      - name: Run release build
        run: cargo build --release
