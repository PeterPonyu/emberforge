name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rust:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run cargo check
        run: cargo check --workspace

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

      # cargo test stays skipped on Windows: the plugin and runtime suites have
      # additional POSIX-only assumptions (process-exit-code paths, shell-script
      # fixtures) on top of the four cases addressed by per-test cfg gates in
      # this PR. windows-latest continues to gate cargo check, clippy, and the
      # release build. Re-enabling test on Windows is tracked in #25.
      - name: Run cargo test
        if: runner.os != 'Windows'
        run: cargo test --workspace

      - name: Run release build
        run: cargo build --release
